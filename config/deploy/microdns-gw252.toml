# MicroDNS - mdns.gw.lo (192.168.1.252)
# Authoritative DNS for gw.lo
# DHCP for 192.168.1.0/24
# Forwards g10/g11/gt/g8/g9 queries to their respective mdns instances

[instance]
id = "microdns-gw"
mode = "standalone"

[[instance.peers]]
id = "microdns-g10"
addr = "192.168.10.252"

[[instance.peers]]
id = "microdns-g11"
addr = "192.168.11.252"

[[instance.peers]]
id = "microdns-gt"
addr = "192.168.200.199"

[dns.recursor]
enabled = true
listen = "0.0.0.0:53"
cache_size = 50000

[dns.recursor.forward_zones]
# g10 network
"g10.lo" = ["192.168.10.252:53"]
"10.168.192.in-addr.arpa" = ["192.168.10.252:53"]
# g11 network
"g11.lo" = ["192.168.11.252:53"]
"11.168.192.in-addr.arpa" = ["192.168.11.252:53"]
# gt network
"gt.lo" = ["192.168.200.199:53"]
"200.168.192.in-addr.arpa" = ["192.168.200.199:53"]
# g8 network
"g8.lo" = ["192.168.8.252:53"]
"8.168.192.in-addr.arpa" = ["192.168.8.252:53"]
# g9 network
"g9.lo" = ["192.168.9.252:53"]
"9.168.192.in-addr.arpa" = ["192.168.9.252:53"]
# local reverse
"1.168.192.in-addr.arpa" = ["192.168.1.252:53"]

[dhcp.v4]
enabled = true
interface = "eth0"
server_ip = "192.168.1.252"

[[dhcp.v4.pools]]
range_start = "192.168.1.2"
range_end = "192.168.1.149"
subnet = "192.168.1.0/24"
gateway = "192.168.1.1"
dns = ["192.168.1.252"]
domain = "gw.lo"
domain_search = ["gw.lo", "gt.lo", "g10.lo", "g11.lo", "g8.lo", "g9.lo"]
lease_time_secs = 600
next_server = "192.168.1.5"
boot_file = "http://192.168.1.5/pxelinux.0"

